<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdGuardian AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 头部 -->
  <header class="popup-header">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3z"
          fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
        <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="logo-text">AdGuardian AI</span>
    </div>
    <button id="btn-settings" class="icon-btn" title="__MSG_popup_settings_title__" aria-label="__MSG_popup_settings_title__">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1m17.5-7.5L14 8m-4 8l-4.5 4.5M5.5 5.5L10 10m4 4l4.5 4.5"/>
      </svg>
    </button>
  </header>

  <!-- AI 状态提示 -->
  <div id="ai-status-bar" class="status-bar" hidden>
    <div class="status-bar-content">
      <span id="ai-status-icon" class="status-icon"></span>
      <span id="ai-status-text" class="status-text"></span>
    </div>
    <button id="btn-setup-key" class="link-btn">__MSG_popup_setup_key__</button>
  </div>

  <!-- 统计卡片 -->
  <section class="stats-section">
    <div class="stat-card">
      <div class="stat-value" id="stat-rule">0</div>
      <div class="stat-label">__MSG_popup_rule_label__</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-card">
      <div class="stat-value" id="stat-ai">0</div>
      <div class="stat-label">__MSG_popup_ai_label__</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-card">
      <div class="stat-value" id="stat-domain">0</div>
      <div class="stat-label">__MSG_popup_domain_label__</div>
    </div>
  </section>

  <!-- 拦截明细 -->
  <section class="details-section">
    <div class="section-title">
      <span>__MSG_popup_details_title__</span>
      <span id="detail-count" class="badge">0</span>
    </div>
    <div id="details-list" class="details-list">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
          <path d="M12 2L4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3z"/>
        </svg>
        <p>__MSG_popup_empty_state__</p>
      </div>
    </div>
  </section>

  <!-- 操作按钮 -->
  <section class="actions-section">
    <button id="btn-pause-page" class="btn btn-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="6" y="4" width="4" height="16" rx="1"/>
        <rect x="14" y="4" width="4" height="16" rx="1"/>
      </svg>
      __MSG_popup_pause_page__
    </button>
    <button id="btn-pause-site" class="btn btn-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
      </svg>
      __MSG_popup_whitelist_site__
    </button>
  </section>

  <!-- 底部链接 -->
  <footer class="popup-footer">
    <span id="strength-indicator" class="footer-tag">__MSG_strength_standard__</span>
    <span class="footer-sep">·</span>
    <a href="#" id="link-options" class="footer-link">__MSG_popup_settings_link__</a>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
